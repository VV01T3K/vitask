packages:
  - apps/*
  - shared/*

catalog:
  "@durable-streams/server": ^0.3.1
  '@fontsource-variable/geist': ^5.2.8
  '@fontsource-variable/geist-mono': ^5.2.7
  "@types/node": ^24
  typescript: ^6
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
